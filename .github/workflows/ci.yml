name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  repo-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup toolchain
        uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true

      - name: Install deps
        run: opam install . --deps-only --yes alcotest

      - name: Run tests
        run: dune build @install @runtest @repo-integration

  package-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - nats-client
          - nats-client-async

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup toolchain
        uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true

      - name: Install deps
        run: |
          opam install . --deps-only --yes alcotest
          if [ "${{ matrix.package }}" = "nats-client-async" ]; then
            opam pin add --yes --no-action -k path nats-client .
            opam install --yes nats-client
          fi

      - name: Run package tests
        run: dune build -p "${{ matrix.package }}" @install @runtest

  published-opam-metadata:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup toolchain
        uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true

      - name: Verify generated opam metadata
        run: ./tests/check-generated-opam-metadata.sh

  opam-linux-build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: ocaml/opam:debian-13-ocaml-4.14
            package: nats-client
          - image: ocaml/opam:debian-13-ocaml-4.14
            package: nats-client-async
          - image: ocaml/opam:debian-13-ocaml-5.4
            package: nats-client
          - image: ocaml/opam:debian-13-ocaml-5.4
            package: nats-client-async
          - image: ocaml/opam:opensuse-15.6-ocaml-5.4
            package: nats-client-async

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Verify Linux opam build for ${{ matrix.package }}
        run: ./tests/check-opam-ci-docker.sh "${{ matrix.image }}" build "${{ matrix.package }}"

  opam-linux-unavailable:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - ocaml/opam:alpine-3.22-ocaml-4.14
          - ocaml/opam:alpine-3.22-ocaml-5.4

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Verify Alpine marks nats-client-async unavailable
        run: ./tests/check-opam-ci-docker.sh "${{ matrix.image }}" expect-unavailable nats-client-async

  opam-extra-arch-unavailable:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: riscv64-ocaml-5.4-nats-client-async
            image: ocaml/opam:debian-13-ocaml-5.4
            platform: linux/riscv64
            package: nats-client-async

    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Checkout
        uses: actions/checkout@v5

      - name: Verify cross-arch unavailability for ${{ matrix.package }}
        env:
          NATS_ML_OPAM_CI_DOCKER_PLATFORM: ${{ matrix.platform }}
        run: ./tests/check-opam-ci-docker.sh "${{ matrix.image }}" expect-unavailable "${{ matrix.package }}"

  opam-linux-lower-bounds:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - nats-client
          - nats-client-async

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Verify lower-bounds install for ${{ matrix.package }}
        run: ./tests/check-opam-ci-docker.sh ocaml/opam:debian-13-ocaml-4.14 lower-bounds "${{ matrix.package }}"

  opam-linux-with-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - ocaml/opam:debian-13-ocaml-4.14
          - ocaml/opam:debian-13-ocaml-5.4
        package:
          - nats-client
          - nats-client-async

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Verify Linux opam --with-test install for ${{ matrix.package }}
        run: ./tests/check-opam-ci-docker.sh "${{ matrix.image }}" with-test "${{ matrix.package }}"

  opam-linux-with-test-opam20:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - ocaml/opam:debian-13-ocaml-4.14
          - ocaml/opam:debian-13-ocaml-5.4
        package:
          - nats-client
          - nats-client-async

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Verify opam 2.0 --with-test install for ${{ matrix.package }}
        env:
          NATS_ML_OPAM_CI_OPAM_VERSION: 2.0.10
        run: ./tests/check-opam-ci-docker.sh "${{ matrix.image }}" with-test-opam20 "${{ matrix.package }}"

  opam-extra-arch-with-test:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: x86_32-ocaml-4.14
            image: ocaml/opam:debian-13-ocaml-4.14
            platform: linux/386
            package: nats-client-async
          - label: arm32-ocaml-4.14
            image: ocaml/opam:debian-13-ocaml-4.14
            platform: linux/arm/v7
            package: nats-client-async
          - label: s390x-ocaml-4.14
            image: ocaml/opam:debian-13-ocaml-4.14
            platform: linux/s390x
            package: nats-client-async
          - label: ppc64le-ocaml-4.14
            image: ocaml/opam:debian-13-ocaml-4.14
            platform: linux/ppc64le
            package: nats-client-async
          - label: riscv64-ocaml-4.14-nats-client
            image: ocaml/opam:debian-13-ocaml-4.14
            platform: linux/riscv64
            package: nats-client
          - label: riscv64-ocaml-4.14-nats-client-async
            image: ocaml/opam:debian-13-ocaml-4.14
            platform: linux/riscv64
            package: nats-client-async
          - label: riscv64-ocaml-5.4-nats-client
            image: ocaml/opam:debian-13-ocaml-5.4
            platform: linux/riscv64
            package: nats-client

    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Checkout
        uses: actions/checkout@v5

      - name: Verify cross-arch opam --with-test install for ${{ matrix.package }}
        env:
          NATS_ML_OPAM_CI_DOCKER_PLATFORM: ${{ matrix.platform }}
        run: ./tests/check-opam-ci-docker.sh "${{ matrix.image }}" with-test "${{ matrix.package }}"

  opam-with-test-regression:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - nats-client
          - nats-client-async

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Cache with-test opam root for ${{ matrix.package }}
        uses: actions/cache@v4
        with:
          path: .opam-with-test-root
          key: ${{ runner.os }}-opam-with-test-${{ matrix.package }}-${{ hashFiles('.prototools', 'dune-project', 'nats-client.opam', 'nats-client-async.opam', 'nats-client.opam.template', 'nats-client-async.opam.template', 'tests/check-opam-ci.sh') }}
          restore-keys: |
            ${{ runner.os }}-opam-with-test-${{ matrix.package }}-

      - name: Install opam
        run: |
          if ! command -v opam >/dev/null 2>&1; then
            HOMEBREW_NO_AUTO_UPDATE=1 brew install opam
          fi
          opam --version

      - name: Verify opam --with-test install for ${{ matrix.package }}
        run: NATS_ML_OPAM_CI_ROOT=.opam-with-test-root ./tests/check-opam-ci.sh with-test "${{ matrix.package }}"
