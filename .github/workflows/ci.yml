name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  repo-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup toolchain
        uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true

      - name: Restore build cache
        uses: actions/cache@v4
        with:
          path: _build
          key: repo-tests-${{ runner.os }}-${{ hashFiles('dune-project', 'lib/**', 'bin/**', 'tests/**', '.github/workflows/ci.yml') }}
          restore-keys: |
            repo-tests-${{ runner.os }}-

      - name: Install deps
        run: opam install . --deps-only --yes alcotest

      - name: Run tests
        run: dune build @install @repo-unit @repo-integration

  published-opam-metadata:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup toolchain
        uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true

      - name: Verify generated opam metadata
        run: |
          dune build nats-client.opam nats-client-async.opam
          git diff --exit-code -- nats-client.opam nats-client-async.opam
          ! grep -F '"alcotest"' nats-client.opam
          ! grep -F '{with-test}' nats-client.opam
          ! grep -F '"@runtest"' nats-client.opam
          ! grep -F 'opam-version >= "2.1"' nats-client.opam
          grep -F 'available: [ os-distribution != "alpine" & arch != "riscv64" ]' nats-client-async.opam
          grep -F '"yojson" {>= "2.0.0"}' nats-client-async.opam
          ! grep -F '"alcotest"' nats-client-async.opam
          ! grep -F '{with-test}' nats-client-async.opam
          ! grep -F '"@runtest"' nats-client-async.opam
          ! grep -F 'opam-version >= "2.1"' nats-client-async.opam

  published-opam-install:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: nats-client
            opam_files: ./nats-client.opam
          - package: nats-client-async
            opam_files: ./nats-client.opam ./nats-client-async.opam

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup toolchain
        uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true

      - name: Install published package in a fresh switch
        env:
          OPAMROOT: ${{ github.workspace }}/.opam-package-root-${{ matrix.package }}
        run: |
          opam init --root="$OPAMROOT" --bare --disable-sandboxing --no-setup --yes default https://opam.ocaml.org
          opam switch create --root="$OPAMROOT" --yes ci ocaml-base-compiler.4.14.0 dune.3.19.0
          opam install --root="$OPAMROOT" --switch=ci --yes ${{ matrix.opam_files }}
