name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  repo-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup toolchain
        uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true

      - name: Restore build cache
        uses: actions/cache@v4
        with:
          path: _build
          key: repo-tests-${{ runner.os }}-${{ hashFiles('dune-project', 'lib/**', 'bin/**', 'tests/**', '.github/workflows/ci.yml') }}
          restore-keys: |
            repo-tests-${{ runner.os }}-

      - name: Install deps
        run: opam install . --deps-only --yes alcotest

      - name: Run tests
        run: dune build @install @repo-unit @repo-integration

  package-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: nats-client
            build_packages: nats-client
          - package: nats-client-async
            build_packages: nats-client,nats-client-async

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup toolchain
        uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true

      - name: Install deps
        run: opam install . --deps-only --yes

      - name: Run published package tests
        run: dune build -p "${{ matrix.build_packages }}" @install @runtest

  published-opam-metadata:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup toolchain
        uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true

      - name: Verify generated opam metadata
        run: |
          dune build nats-client.opam nats-client-async.opam
          git diff --exit-code -- nats-client.opam nats-client-async.opam
          ! grep -F '"alcotest"' nats-client.opam
          grep -F '"@runtest"' nats-client.opam
          grep -F '{with-test & opam-version >= "2.1"}' nats-client.opam
          grep -F 'available: [ os-distribution != "alpine" & arch != "riscv64" ]' nats-client-async.opam
          grep -F '"yojson" {>= "1.7.0"}' nats-client-async.opam
          ! grep -F '"alcotest"' nats-client-async.opam
          grep -F '"@runtest"' nats-client-async.opam
          grep -F '{with-test & opam-version >= "2.1" & arch != "x86_32" & arch != "arm32" & arch != "ppc64"}' nats-client-async.opam
          grep -F '(modes byte)' tests/dune
