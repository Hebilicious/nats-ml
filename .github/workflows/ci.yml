name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  repo-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup toolchain
        uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true

      - name: Restore build cache
        uses: actions/cache@v4
        with:
          path: _build
          key: repo-tests-${{ runner.os }}-${{ hashFiles('dune-project', 'lib/**', 'bin/**', 'tests/**', '.github/workflows/ci.yml') }}
          restore-keys: |
            repo-tests-${{ runner.os }}-

      - name: Install deps
        run: opam install . --deps-only --yes alcotest

      - name: Run tests
        run: dune build @install @repo-unit @repo-integration

  package-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: nats-client
            build_packages: nats-client
          - package: nats-client-async
            build_packages: nats-client,nats-client-async

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup toolchain
        uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true

      - name: Install deps
        run: opam install . --deps-only --yes

      - name: Run published package tests
        run: dune build -p "${{ matrix.build_packages }}" @install @published-package-tests

  published-opam-metadata:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup toolchain
        uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true

      - name: Install release tooling
        run: opam install dune-release --yes

      - name: Verify generated opam metadata
        run: |
          dune build nats-client.opam nats-client-async.opam
          git diff --exit-code -- nats-client.opam nats-client-async.opam
          opam exec -- dune-release distrib
          tar -tjf _build/*.tbz > /tmp/nats-client-src.lst
          ! grep -F '"alcotest"' nats-client.opam
          ! grep -F '"@runtest"' nats-client.opam
          grep -F '"@published-package-tests"' nats-client.opam
          grep -F '{with-test}' nats-client.opam
          grep -F 'available: [ os-distribution != "alpine" & arch != "riscv64" ]' nats-client-async.opam
          grep -F '"yojson" {>= "2.0.0"}' nats-client-async.opam
          ! grep -F '"alcotest"' nats-client-async.opam
          ! grep -F '"@runtest"' nats-client-async.opam
          grep -F '"@published-package-tests"' nats-client-async.opam
          grep -F '{with-test & arch != "s390x"}' nats-client-async.opam
          grep -F '(name published-package-tests)' published-tests/dune
          grep -F '(modes byte)' published-tests/dune
          grep -F 'published-tests/dune' /tmp/nats-client-src.lst
          grep -F 'published-tests/published_test_protocol.ml' /tmp/nats-client-src.lst
          grep -F 'published-tests/published_test_async_client_unit.ml' /tmp/nats-client-src.lst
