name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-latest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup toolchain
        uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true

      - name: Install deps
        run: opam install . --deps-only --with-test --yes

      - name: Run tests
        run: dune build @install @runtest

  test-ocaml-414:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup toolchain
        uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true

      - name: Run OCaml 4.14 compatibility checks
        run: ./scripts/test-ocaml-414.sh
