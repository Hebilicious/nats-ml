name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup toolchain
        uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true

      - name: Install deps
        run: opam install . --deps-only --with-test --yes

      - name: Run tests
        run: dune build @install @runtest

  opam-package-isolation:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - nats-client
          - nats-client-async

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup toolchain
        uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true

      - name: Verify isolated opam install for ${{ matrix.package }}
        run: ./tests/check-opam-package-isolation.sh "${{ matrix.package }}"
