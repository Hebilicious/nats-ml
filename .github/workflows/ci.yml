name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: test (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - latest
          - ocaml-4.14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup toolchain
        uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true

      - name: Install deps
        if: matrix.target == 'latest'
        run: opam install . --deps-only --with-test --yes

      - name: Run latest tests
        if: matrix.target == 'latest'
        run: dune build @install @runtest

      - name: Run pinned-stack integration tests
        if: matrix.target == 'ocaml-4.14'
        run: ./tests/test-integration.sh
