name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install proto
        run: |
          curl -fsSL https://moonrepo.dev/install/proto.sh | bash -s -- --yes
          echo "$HOME/.proto/bin" >> "$GITHUB_PATH"

      - name: Install toolchain and deps
        run: |
          proto install
          proto exec --tools-from-config -- opam install . --deps-only --with-test --yes

      - name: Run tests
        run: proto exec --tools-from-config -- dune runtest
