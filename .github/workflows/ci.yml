name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  repo-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup toolchain
        uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true

      - name: Install deps
        run: opam install . --deps-only --yes alcotest

      - name: Run tests
        run: dune build @install @runtest @repo-integration

  package-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - nats-client
          - nats-client-async

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup toolchain
        uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true

      - name: Install deps
        run: |
          opam install . --deps-only --yes
          if [ "${{ matrix.package }}" = "nats-client-async" ]; then
            opam pin add --yes --no-action -k path nats-client .
            opam install --yes nats-client
          fi

      - name: Run package tests
        run: dune build -p "${{ matrix.package }}" @install @runtest

  published-opam-metadata:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup toolchain
        uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true

      - name: Verify generated opam metadata
        run: ./tests/check-generated-opam-metadata.sh
