name: Release PR

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup toolchain
        uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true

      - name: Install dependencies
        run: opam install . --deps-only --with-test --yes

      - name: Install release tools
        run: opam install dune-release opam-publish --yes

      - name: Prepare release PR content
        id: prepare
        run: scripts/prepare-release.sh prepare-pr

      - name: Create or update release PR
        if: steps.prepare.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "Prepare release v${{ steps.prepare.outputs.next_version }}"
          branch: "release/v${{ steps.prepare.outputs.next_version }}"
          title: "release: v${{ steps.prepare.outputs.next_version }}"
          body: |
            Automated release PR for `v${{ steps.prepare.outputs.next_version }}`.

            This PR was prepared from `.changes/` fragments and updates `CHANGES.md`.

            After this PR is merged:
            1. `tag-release.yml` will create and push `v${{ steps.prepare.outputs.next_version }}` from the merge commit.
            2. `publish.yml` will run `dune-release` and `opam-publish`.
          delete-branch: true
          add-paths: |
            CHANGES.md
            .changes
